<!DOCTYPE html>
<html>

<head>
<title>Cart</title>


<link rel="stylesheet"
href="{{ url_for('static', filename='css/admin.css') }}">

</head>

<body>

<h1>Your Cart</h1>

{% for product in products %}

<div>

<h3>{{ product.name }}</h3>

<p>Price: ₦{{ product.price }}</p>

<p>

<a href="/minus/{{ product.id }}" class="quantity-btn">
    -
</a>

&nbsp;

{{ product.quantity }}

&nbsp;

<a href="/increase-quantity/{{ product.id }}" class="quantity-btn">
    +
</a>

</p>

<p>
    Line Total:
    ₦{{ product.price * product.quantity }}
</p>

<a href="/remove-from-cart/{{ product.id }}">
    Remove
</a>

<hr>

</div>

{% endfor %}

<!-- CHECK OUT BUTTON -->

<br><br>

<h2>
    Total: ₦{{ total }}
</h2>

<br>

<a href="/checkout">
    <button>Proceed to Checkout</button>
</a>






<script src="{{ url_for('static', filename='js/script.js') }}"></script>

{% if toast %}

<script>

document.addEventListener("DOMContentLoaded", function(){

    showToast("{{ toast }}");

});

</script>

{% endif %}

</body>

</html>
