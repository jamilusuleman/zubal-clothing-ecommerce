<!DOCTYPE html>
<html>
<head>
    <title>Order Status</title>
</head>
<body>

<h1>Order Status</h1>

{% if order %}

<p>
    Customer:
    {{ order.customer_name }}
</p>

<p>
    Phone:
    {{ order.phone }}
</p>

<p>
    Products:
    {{ order.products }}
</p>

<p>
    Total:
    ₦{{ order.total }}
</p>

<p>
    Status:
    {{ order.status }}
</p>

{% else %}

<p>No order found.</p>

{% endif %}

</body>
</html>
